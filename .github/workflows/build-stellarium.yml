name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Build
        working-directory: /tmp/s
        run: |
          set -e
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          echo "EMSDK=$EMSDK"
          echo "EMSCRIPTEN=$EMSCRIPTEN"
          ls -la "$EMSDK/upstream/emscripten/tools/" 2>/dev/null || echo "tools dir missing"
          # Set EMSCRIPTEN_TOOL_PATH explicitly
          export EMSCRIPTEN_TOOL_PATH="$EMSDK/upstream/emscripten/tools"
          export EMSCRIPTEN_ROOT="$EMSDK/upstream/emscripten"
          echo "EMSCRIPTEN_TOOL_PATH=$EMSCRIPTEN_TOOL_PATH"
          echo "Start: $(date)"
          scons -j4 mode=release 2>&1 | tee /tmp/build.log
          echo "Done: $(date)"

      - name: Verify
        run: ls -lh /tmp/s/build/stellarium-web-engine.* || { tail -80 /tmp/build.log; exit 1; }

      - name: Copy & Push
        run: |
          mkdir -p docs/kg/stellarium
          cp /tmp/s/build/stellarium-web-engine.js docs/kg/stellarium/
          cp /tmp/s/build/stellarium-web-engine.wasm docs/kg/stellarium/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kg/stellarium/
          git diff --cached --quiet || git commit -m "chore: Stellarium Web Engine artifacts" && git push
