name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Patch & pre-build
        working-directory: /tmp/s
        run: |
          sed -i "/if env\['werror'\]:/,+1d" SConstruct
          sed -i '/if os.path.dirname/,+2d' tools/make-assets.py
          # Generate assets FIRST
          python3 tools/make-assets.py
          echo "=== Assets OK ==="

      - name: Build (force rebuild)
        working-directory: /tmp/s
        run: |
          set -e
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          echo "Build start: $(date)"
          # Clean + rebuild from scratch
          emscons scons -c mode=release 2>/dev/null || true
          emscons scons -j2 mode=release 2>&1 | tee /tmp/build.log
          echo "Build done: $(date)"

      - name: Verify & Push
        run: |
          echo "=== Build output ==="
          ls -lh /tmp/s/build/stellarium-web-engine.* 2>/dev/null || echo "NO OUTPUT"
          if [ -f /tmp/s/build/stellarium-web-engine.js ] && [ -f /tmp/s/build/stellarium-web-engine.wasm ]; then
            mkdir -p docs/kg/stellarium
            cp /tmp/s/build/stellarium-web-engine.js docs/kg/stellarium/
            cp /tmp/s/build/stellarium-web-engine.wasm docs/kg/stellarium/
            echo "WASM size: $(du -h /tmp/s/build/stellarium-web-engine.wasm | cut -f1)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/kg/stellarium/
            if git diff --cached --quiet; then
              echo "No changes"
            else
              git commit -m "chore: Stellarium Web Engine artifacts" && git push
              echo "Pushed OK"
            fi
          else
            echo "=== BUILD FAILED ==="
            tail -80 /tmp/build.log
            exit 1
          fi
