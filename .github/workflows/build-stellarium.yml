name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Debug env
        run: |
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          echo "EMSDK=$EMSDK"
          echo "=== emscons ==="
          which emscons || echo "NOT FOUND"
          echo "=== tools dir ==="
          ls "$EMSDK/upstream/emscripten/tools/" 2>/dev/null || echo "no tools/"
          ls "$EMSDK/upstream/emscripten/tools/scons/" 2>/dev/null || echo "no tools/scons/"
          # Try to find the emscripten scons tool
          find "$EMSDK/upstream/emscripten" -name "emscripten" -type d 2>/dev/null | head -5
          find "$EMSDK/upstream/emscripten" -name "site_tools" -type d 2>/dev/null | head -5

      - name: Build
        working-directory: /tmp/s
        run: |
          set -e
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"

          # Find the scons tool directory
          SITE_TOOLS=$(find "$EMSDK/upstream/emscripten" -name "site_tools" -type d 2>/dev/null | head -1)
          if [ -n "$SITE_TOOLS" ]; then
            export EMSCRIPTEN_TOOL_PATH="$SITE_TOOLS"
          else
            export EMSCRIPTEN_TOOL_PATH="$EMSDK/upstream/emscripten/tools"
          fi
          echo "EMSCRIPTEN_TOOL_PATH=$EMSCRIPTEN_TOOL_PATH"

          echo "Build start: $(date)"
          scons -j4 mode=release 2>&1 | tee /tmp/build.log
          echo "Build done: $(date)"

      - name: Verify & Push
        run: |
          if [ -f /tmp/s/build/stellarium-web-engine.js ]; then
            mkdir -p docs/kg/stellarium
            cp /tmp/s/build/stellarium-web-engine.js docs/kg/stellarium/
            cp /tmp/s/build/stellarium-web-engine.wasm docs/kg/stellarium/
            ls -lh docs/kg/stellarium/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/kg/stellarium/
            git diff --cached --quiet || (git commit -m "chore: Stellarium Web Engine artifacts" && git push)
          else
            echo "=== BUILD FAILED ==="
            tail -80 /tmp/build.log
            exit 1
          fi
