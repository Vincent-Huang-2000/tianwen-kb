name: Build Stellarium Web Engine

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-stellarium.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 2.0.34
          actions-cache-folder: 'emsdk-cache'

      - name: Install scons
        run: pip3 install scons

      - name: Clone Stellarium
        run: git clone --depth 1 https://github.com/Stellarium/stellarium-web-engine.git /tmp/s

      - name: Clone Chinese sky culture data
        run: |
          git clone --depth 1 https://github.com/Stellarium/stellarium-skycultures.git /tmp/skycultures

      - name: Patch source
        working-directory: /tmp/s
        run: |
          sed -i "/if env\['werror'\]:/,+1d" SConstruct
          sed -i '/if os.path.dirname/,+2d' tools/make-assets.py
          python3 tools/make-assets.py
          echo "=== Assets generated ==="

      - name: Build
        working-directory: /tmp/s
        run: |
          set -e
          EMSDK_ENV=$(find / -name "emsdk_env.sh" -type f 2>/dev/null | head -1)
          source "$EMSDK_ENV"
          echo "Build start: $(date)"
          emscons scons -c mode=release 2>/dev/null || true
          emscons scons -j2 mode=release 2>&1 | tee /tmp/build.log
          echo "Build done: $(date)"

      - name: Deploy to repo
        run: |
          WASM_DIR=docs/kg/stellarium

          # Core engine
          mkdir -p "$WASM_DIR"
          cp /tmp/s/build/stellarium-web-engine.js "$WASM_DIR/"
          cp /tmp/s/build/stellarium-web-engine.wasm "$WASM_DIR/"

          # Runtime data (star catalogs)
          if [ -d /tmp/s/data ]; then
            cp -r /tmp/s/data "$WASM_DIR/data"
            echo "Data: $(du -sh /tmp/s/data | cut -f1)"
          fi

          # Chinese sky culture
          if [ -d /tmp/skycultures/chinese ]; then
            mkdir -p "$WASM_DIR/skycultures"
            cp -r /tmp/skycultures/chinese "$WASM_DIR/skycultures/"
            echo "Sky culture: chinese OK"
          fi

          echo "=== Output ==="
          du -sh "$WASM_DIR"
          ls -lh "$WASM_DIR"/*.wasm "$WASM_DIR"/*.js

          # Commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/kg/stellarium/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: Stellarium Web Engine + data + Chinese sky culture" && git push
            echo "Pushed OK"
          fi
