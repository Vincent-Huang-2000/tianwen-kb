<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 - 星庐</title>
<link rel="stylesheet" href="../css/style.css">
<style>
body{background:var(--bg-deepest);color:var(--text-body);font-family:var(--font-sans);margin:0}
.main{max-width:1400px;margin:0 auto;padding:20px;padding-top:76px}
h1{color:var(--accent-gold);font-family:var(--font-serif);text-align:center;margin-bottom:4px}
h2{color:var(--accent-gold);font-size:1.1rem;margin:24px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px}
.tabs{display:flex;gap:0;justify-content:center;margin:16px 0}
.tabs button{padding:10px 24px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-body);cursor:pointer;font-size:0.9rem}
.tabs button:first-child{border-radius:6px 0 0 6px}
.tabs button:last-child{border-radius:0 6px 6px 0}
.tabs button.on{background:var(--accent-gold);color:#0a0e1a;border-color:var(--accent-gold)}
.panel{display:none}.panel.on{display:block}
.tree{font-size:0.85rem;line-height:1.8}
.tree ul{list-style:none;padding-left:24px}
.tree li{position:relative}
.tree li::before{content:"";position:absolute;left:-16px;top:10px;width:12px;height:1px;background:var(--border)}
.tree li::after{content:"";position:absolute;left:-16px;top:0;bottom:0;width:1px;background:var(--border)}
.tree li:last-child::after{height:10px}
.tree .node{cursor:pointer;color:var(--text-body);transition:color 0.2s;display:inline-block;padding:2px 6px;border-radius:4px}
.tree .node:hover{color:var(--accent-gold);background:rgba(201,169,110,0.1)}
.tree .node.folder{font-weight:600;color:var(--accent-warm)}
.tree .node.desc{font-size:0.75rem;color:var(--text-muted);margin-left:8px}
.tree .collapsed>ul{display:none}
.xb-item{padding:12px 16px;margin-bottom:8px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px}
.xb-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.xb-year{font-weight:700;color:var(--accent-gold);min-width:70px}
.xb-type{padding:2px 10px;border-radius:10px;font-size:0.75rem;color:#fff}
.xb-sources{font-size:0.75rem;color:var(--text-muted)}
.xb-text{font-size:0.82rem;line-height:1.6;color:var(--text-muted);padding-left:22px;cursor:pointer}
.xb-text:hover{color:var(--accent-gold)}
.xb-omen{color:var(--accent-gold);font-size:0.78rem;display:inline-block;margin-top:2px}
.as-item{padding:10px 14px;margin-bottom:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;display:flex;gap:12px;align-items:flex-start}
.as-type{min-width:60px;padding:2px 8px;border-radius:10px;font-size:0.72rem;color:#fff;text-align:center}
.as-consequence{font-size:0.82rem;line-height:1.5;flex:1}
.as-source{font-size:0.7rem;color:var(--text-muted)}
.e-solar{background:#B33A3A}.e-lunar{background:#5B3A7A}.e-comet{background:#3A6B5A}
.e-meteor{background:#7A5B3A}.e-encroach{background:#8B4513}
</style>
</head>
<body>
<nav class="top-nav"><div class="nav-inner">
<a href="../index.html" class="nav-logo">&#9737; 星庐</a>
<div class="nav-links">
<a href="../index.html">首页</a><a href="../search.html">搜索</a>
<a href="../kg/timeline.html">天象事件</a><a href="../kg/starmap.html">古星图</a>
<a href="../kg/network.html">知识图谱</a> <span class="nav-theme" style="color:var(--text-muted);margin-left:2px"><a id="theme-day" href="javascript:_switchTheme('light')" style="color:var(--text-muted);text-decoration:none" title="日间模式">昼</a>/<a id="theme-night" href="javascript:_switchTheme('dark')" style="color:var(--accent-gold);text-decoration:none;font-weight:700" title="夜间模式">夜</a></span></div>
</div></nav>
<div class="main">
<h1>知识图谱</h1>
<div class="tabs">
<button class="on" onclick="showTab('tree')">星官谱系</button>
<button onclick="showTab('cross')">跨书关联 (72)</button>
<button onclick="showTab('astro')">占星对应 (90)</button>
</div>
<div class="panel on" id="panel-tree"><h2>中国星官体系</h2><div class="tree" id="tree"></div></div>
<div class="panel" id="panel-cross"><h2>跨书天象验证</h2><div id="cross-summary" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:0.82rem"></div><div id="cross-list"></div></div>
<div class="panel" id="panel-astro"><h2>占星对应</h2><div id="astro-list"></div></div>
</div>
<script src="kg_tree_data.js"></script>
<script src="kg_cross_data.js"></script>
<script src="kg_astro_data.js"></script>
<script>
var T={solar_eclipse:"日食",lunar_eclipse:"月食",comet:"彗星",meteor:"流星",guest_star:"客星",encroach:"星犯",guard:"星守",occult:"星掩",entry:"星入",conjunction:"星合",clustering:"星聚",day_visible:"昼见"};
var C={solar_eclipse:"e-solar",lunar_eclipse:"e-lunar",comet:"e-comet",meteor:"e-meteor",encroach:"e-encroach"};
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function showTab(n){
 document.querySelectorAll(".tabs button").forEach(function(b){b.classList.remove("on")});
 event.target.classList.add("on");
 document.querySelectorAll(".panel").forEach(function(p){p.classList.remove("on")});
 document.getElementById("panel-"+n).classList.add("on");
}
function renderTree(node,container,depth){
 var ul=document.createElement("ul");container.appendChild(ul);
 (node.children||[]).forEach(function(child){
  var li=document.createElement("li");
  var s=document.createElement("span");s.className="node";
  if(child.children&&child.children.length>0){
   s.className+=" folder";s.textContent=(depth===0?"● ":"")+child.name;
   if(child.description){var d=document.createElement("span");d.className="node desc";d.textContent=" — "+child.description;s.appendChild(d);}
   s.onclick=function(e){e.stopPropagation();this.parentElement.classList.toggle("collapsed");};
   li.appendChild(s);renderTree(child,li,depth+1);
  }else{
   s.textContent=child.name;
   if(child.description){var d=document.createElement("span");d.className="node desc";d.textContent=" — "+child.description;s.appendChild(d);}
   if(child.stars){var st=document.createElement("span");st.className="node desc";st.textContent=" ★ "+child.stars;s.appendChild(st);}
   li.appendChild(s);
  }
  ul.appendChild(li);
 });
}
renderTree(window.KG_TREE,document.getElementById("tree"),0);
// Cross-book type summary
var cs=document.getElementById("cross-summary");
var tc={};
window.KG_CROSS.forEach(function(cb){tc[cb.type]=(tc[cb.type]||0)+1;});
var order=["encroach","entry","occult","lunar_eclipse","solar_eclipse","comet","meteor","clustering"];
order.forEach(function(k){if(tc[k])cs.innerHTML+='<span style="padding:3px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;white-space:nowrap"><span class="xb-type '+(C[k]||"")+'" style="margin-right:6px">'+T[k]+'</span><strong style="color:var(--accent-gold)">'+tc[k]+'</strong></span>';});
cs.innerHTML+='<span style="padding:3px 12px;color:var(--text-muted);margin-left:auto">共 <strong style="color:var(--accent-gold)">'+window.KG_CROSS.length+'</strong> 条</span>';
var cl=document.getElementById("cross-list");
window.KG_CROSS.forEach(function(cb){
 var y=cb.year<0?"前"+(-cb.year):""+cb.year;
 var h="<div class=\"xb-item\">";
 h+="<div class=\"xb-head\"><span class=\"xb-year\">"+y+"</span><span class=\"xb-type "+(C[cb.type]||"")+"\">"+(T[cb.type]||cb.type)+"</span><span class=\"xb-sources\">"+cb.sources.length+"部史书："+cb.sources.join(", ")+"</span></div>";
 cb.events.forEach(function(ev){
  var u=ev.url||"";
  h+="<div class=\"xb-text\" onclick=\"if(this.dataset.url)window.open(this.dataset.url);\" data-url=\""+u+"\">"+esc(ev.description)+" <small>("+ev.source+")</small>";
  if(ev.omen) h+=" <span class=\"xb-omen\">"+esc(ev.omen)+"</span>";
  h+="</div>";
 });
 h+="</div>";
 cl.innerHTML+=h;
});
var al=document.getElementById("astro-list");
window.KG_ASTRO.forEach(function(a){
 var h="<div class=\"as-item\">";
 h+="<span class=\"as-type "+(C[a.type]||"")+"\">"+(T[a.type]||a.type)+"</span>";
 h+="<div class=\"as-consequence\">"+esc(a.consequence)+"</div>";
 h+="<div class=\"as-source\">"+esc(a.source)+"</div>";
 h+="</div>";
 al.innerHTML+=h;
});
</script>
<script src="../js/qr-popup.js"></script>

<script src="../js/theme.js"></script>
</body>
</html>
