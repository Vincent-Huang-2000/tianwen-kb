<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交互星图 · 古星图</title>
<style>
  :root {
    --bg: #06080f;
    --text: #c8c0a8;
    --gold: #c4a35a;
    --jade: #4a9b8e;
    --surface: rgba(13, 17, 23, 0.85);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #stel-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(6,8,15,0.95) 0%, rgba(6,8,15,0) 100%);
    pointer-events: none;
  }
  .top-bar > * { pointer-events: auto; }

  .home-btn {
    text-decoration: none;
    color: var(--gold);
    font-size: 1.1rem;
    padding: 6px 14px;
    border: 1px solid rgba(196, 163, 90, 0.3);
    border-radius: 6px;
    background: var(--surface);
    backdrop-filter: blur(8px);
    transition: all 0.25s;
  }
  .home-btn:hover {
    background: rgba(196, 163, 90, 0.15);
    border-color: var(--gold);
  }

  .info-text {
    color: var(--gold);
    font-size: 0.9rem;
    opacity: 0.8;
  }

  .bottom-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 8px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 6px 12px;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .ctrl-btn:hover {
    background: rgba(196, 163, 90, 0.15);
    border-color: var(--gold);
    color: var(--gold);
  }
  .ctrl-btn.active {
    background: rgba(196, 163, 90, 0.2);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-text {
    color: var(--gold);
    font-size: 1.2rem;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  /* Loading dots */
  .loading-dots {
    display: flex;
    gap: 8px;
  }
  .loading-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* Error state */
  .error-box {
    display: none;
    text-align: center;
    max-width: 400px;
    padding: 32px;
    border: 1px solid rgba(196, 107, 90, 0.3);
    border-radius: 12px;
    background: rgba(196, 107, 90, 0.05);
  }
  .error-box.show { display: block; }
  .error-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .error-title { color: #c46b5a; font-size: 1.1rem; margin-bottom: 8px; }
  .error-detail { color: #8a8070; font-size: 0.85rem; line-height: 1.6; }
  .error-detail code {
    background: rgba(255,255,255,0.05);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.8rem;
  }
  .back-link {
    display: inline-block;
    margin-top: 16px;
    color: var(--jade);
    text-decoration: none;
    font-size: 0.9rem;
    border: 1px solid rgba(74,155,142,0.3);
    padding: 6px 18px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .back-link:hover {
    background: rgba(74,155,142,0.15);
    border-color: var(--jade);
  }
</style>
<script src="../js/anti-copy.js"></script>
</head>
<body>

<!-- Overlay (loading / error) -->
<div class="overlay" id="overlay">
  <!-- Loading state -->
  <div id="loadingState">
    <div class="loading-text">加载星图引擎</div>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>
  <!-- Error state -->
  <div class="error-box" id="errorState">
    <div class="error-icon">⚠️</div>
    <div class="error-title" id="errorTitle">引擎加载失败</div>
    <div class="error-detail" id="errorDetail"></div>
    <a href="starmap.html" class="back-link">← 返回古星图</a>
  </div>
</div>

<canvas id="stel-canvas"></canvas>

<div class="top-bar">
  <a href="starmap.html" class="home-btn">☉ 返回古星图</a>
  <span class="info-text" id="timeDisplay"></span>
</div>

<div class="bottom-bar" id="controls">
  <button class="ctrl-btn" onclick="resetView()" title="重置视角">⟳ 重置</button>
  <button class="ctrl-btn" id="btnStars" onclick="toggleStars()">★ 恒星</button>
  <button class="ctrl-btn" id="btnConst" onclick="toggleConstellations()">✧ 星座线</button>
  <button class="ctrl-btn" id="btnAtmo" onclick="toggleAtmosphere()">☁ 大气</button>
  <button class="ctrl-btn" id="btnGrid" onclick="toggleGrid()">◎ 赤道网格</button>
  <button class="ctrl-btn" onclick="setNow()">◷ 当前时刻</button>
</div>

<script>
(function() {
  var overlay = document.getElementById('overlay');
  var loadingState = document.getElementById('loadingState');
  var errorState = document.getElementById('errorState');
  var errorTitle = document.getElementById('errorTitle');
  var errorDetail = document.getElementById('errorDetail');
  var canvas = document.getElementById('stel-canvas');
  var timeDisplay = document.getElementById('timeDisplay');

  var stel = null;
  var animationId = null;
  var engineReady = false;

  // --- Show error ---
  function showError(title, detail) {
    loadingState.style.display = 'none';
    errorState.classList.add('show');
    errorTitle.textContent = title;
    errorDetail.innerHTML = detail;
    // Keep overlay visible, don't add 'hidden'
  }

  // --- 1. Check if StelWebEngine loaded ---
  if (typeof StelWebEngine === 'undefined') {
    showError(
      '引擎文件缺失',
      'Stellarium Web Engine 尚未构建。<br><br>' +
      '请在 GitHub Actions 中运行 <code>Build Stellarium Web Engine</code> 工作流，' +
      '构建完成后 <code>stellarium-web-engine.js</code> 和 <code>.wasm</code> 文件将自动部署。'
    );
    return; // Stop — no engine to initialize
  }

  // --- 2. Set a timeout — if engine doesn't init within 30s, show error ---
  var loadTimeout = setTimeout(function() {
    if (!engineReady) {
      showError(
        '引擎初始化超时',
        'WASM 引擎在 30 秒内未能完成初始化。<br><br>' +
        '可能原因：<br>' +
        '· 网络加载 <code>.wasm</code> 文件过慢<br>' +
        '· 浏览器不支持 WebAssembly<br>' +
        '· 文件路径错误'
      );
    }
  }, 30000);

  // --- 3. Initialize Stellarium Web Engine ---
  try {
    StelWebEngine({
      wasmFile: 'stellarium/stellarium-web-engine.wasm',
      canvasElement: canvas,
      onReady: function(module) {
        engineReady = true;
        clearTimeout(loadTimeout);
        stel = module;

        // Hide overlay
        overlay.classList.add('hidden');
        setTimeout(function() { overlay.remove(); }, 600);

        // Observer: Beijing, China
        if (stel.observer && stel.observer.setLatLong) {
          stel.observer.setLatLong(39.9, 116.4);
        }

        updateTimeDisplay();
        setupControls();
        requestAnimationFrame(renderLoop);
        updateButtonStates();

        console.log('Stellarium Web Engine ready');
      }
    });
  } catch(e) {
    showError(
      '引擎初始化异常',
      '初始化 Stellarium Web Engine 时发生错误：<br><code>' + e.message + '</code>'
    );
  }

  // --- Render loop ---
  function renderLoop(ts) {
    if (stel && stel.core && stel.core.render) {
      stel.core.render(ts / 1000);
    }
    animationId = requestAnimationFrame(renderLoop);
  }

  // --- Time display ---
  function updateTimeDisplay() {
    if (!stel) return;
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    timeDisplay.textContent = '观测时间: ' + h + ':' + m + ':' + s + ' CST';
    setTimeout(updateTimeDisplay, 1000);
  }

  // --- Keyboard ---
  function setupControls() {
    document.addEventListener('keydown', function(e) {
      if (!stel) return;
      switch(e.key) {
        case 'ArrowUp':    moveView(0, -5); break;
        case 'ArrowDown':  moveView(0, 5); break;
        case 'ArrowLeft':  moveView(-5, 0); break;
        case 'ArrowRight': moveView(5, 0); break;
        case '+': case '=': zoomView(0.8); break;
        case '-': zoomView(1.2); break;
      }
    });
  }

  function moveView(dx, dy) {
    if (stel && stel.core && stel.core.move) stel.core.move(dx, dy);
  }

  function zoomView(factor) {
    if (stel && stel.core && stel.core.zoom) stel.core.zoom(factor);
  }

  // --- Button actions ---
  window.resetView = function() {
    if (!stel) return;
    if (stel.observer && stel.observer.setLatLong) stel.observer.setLatLong(39.9, 116.4);
    if (stel.core && stel.core.resetView) stel.core.resetView();
  };

  window.toggleStars = function() {
    if (stel && stel.core && stel.core.stars) {
      stel.core.stars.visible = !stel.core.stars.visible;
      updateButtonStates();
    }
  };

  window.toggleConstellations = function() {
    if (stel && stel.core && stel.core.constellations) {
      stel.core.constellations.lines_visible = !stel.core.constellations.lines_visible;
      updateButtonStates();
    }
  };

  window.toggleAtmosphere = function() {
    if (stel && stel.core && stel.core.atmosphere) {
      stel.core.atmosphere.visible = !stel.core.atmosphere.visible;
      updateButtonStates();
    }
  };

  window.toggleGrid = function() {
    if (stel && stel.core && stel.core.lines && stel.core.lines.equatorial) {
      stel.core.lines.equatorial.visible = !stel.core.lines.equatorial.visible;
      updateButtonStates();
    }
  };

  window.setNow = function() {
    if (stel && stel.observer && stel.observer.setTime) {
      var now = new Date();
      var mjd = now / 86400000 - 2400000.5 + 2440587.5;
      stel.observer.setTime(mjd);
    }
  };

  function updateButtonStates() {
    if (!stel || !stel.core) return;
    var stars = stel.core.stars;
    var constl = stel.core.constellations;
    var atmo = stel.core.atmosphere;
    var grid = stel.core.lines && stel.core.lines.equatorial;

    var btnStars = document.getElementById('btnStars');
    var btnConst = document.getElementById('btnConst');
    var btnAtmo = document.getElementById('btnAtmo');
    var btnGrid = document.getElementById('btnGrid');
    if (btnStars) btnStars.classList.toggle('active', stars && stars.visible);
    if (btnConst) btnConst.classList.toggle('active', constl && constl.lines_visible);
    if (btnAtmo) btnAtmo.classList.toggle('active', atmo && atmo.visible);
    if (btnGrid) btnGrid.classList.toggle('active', grid && grid.visible);
  }

})();
</script>

</body>
</html>
