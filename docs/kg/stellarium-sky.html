<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星图 · 天问知识库</title>
<style>
  :root {
    --bg: #06080f;
    --text: #c8c0a8;
    --gold: #c4a35a;
    --surface: rgba(13, 17, 23, 0.85);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #stel-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
    z-index: 1;
  }

  /* Home button — top right, compact, semi-transparent */
  .home-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 20;
    text-decoration: none;
    color: rgba(200, 192, 168, 0.7);
    font-size: 0.85rem;
    font-family: 'Noto Serif SC', 'STSong', serif;
    padding: 5px 12px;
    border: 1px solid rgba(200, 192, 168, 0.15);
    border-radius: 14px;
    background: rgba(6, 8, 15, 0.6);
    backdrop-filter: blur(6px);
    transition: all 0.25s;
    letter-spacing: 1px;
  }
  .home-btn:hover {
    background: rgba(196, 163, 90, 0.12);
    border-color: rgba(196, 163, 90, 0.35);
    color: #c4a35a;
  }
</style>
<script src="../js/anti-copy.js"></script>
</head>
<body>

<iframe
  id="stel-frame"
  src="https://stellarium-web.org/"
  allow="geolocation"
  allowfullscreen>
</iframe>

<a href="../index.html" class="home-btn">← 返回首页</a>

</body>
</html>
