<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 — 星庐·中国古天文学知识库</title>
    <meta name="description" content="全文搜索十七部天文志/天官书，跨越西汉至清代的天象记录。">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ============================================================
           SEARCH PAGE: ADDITIONAL STYLES
           ============================================================ */
        .search-page-title {
            text-align: center;
            font-family: var(--font-serif);
            font-size: 2rem;
            color: var(--accent-gold);
            margin-bottom: 8px;
            letter-spacing: 0.06em;
        }

        .search-page-subtitle {
            text-align: center;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 36px;
        }

        .search-form {
            display: flex;
            gap: 8px;
            margin-bottom: 36px;
        }

        .search-form input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-body);
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-form input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(201, 169, 110, 0.1);
        }

        .search-form input::placeholder {
            color: var(--text-dim);
        }

        .search-form button {
            background: var(--accent-gold);
            color: var(--bg-deepest);
            border: none;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .search-form button:hover {
            background: var(--accent-warm);
        }

        .search-form button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* --- Search Info Bar --- */
        .search-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .search-info .hit-count {
            color: var(--accent-gold);
        }

        .search-info .search-time {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* --- Dynasty Badge (in search results) --- */
        .result-dynasty {
            display: inline-block;
            font-family: var(--font-sans);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--accent-warm);
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.2);
            padding: 2px 10px;
            border-radius: 14px;
            margin-left: 8px;
            vertical-align: middle;
            letter-spacing: 0.05em;
        }

        /* --- Result Link --- */
        .result-link {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .result-link:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.08);
            color: inherit;
        }

        .result-link .result-title {
            font-family: var(--font-serif);
            font-size: 1.05rem;
            color: var(--accent-gold);
            margin-bottom: 4px;
        }

        .result-link .result-title:hover {
            color: var(--accent-warm);
        }

        .result-link .result-chapter {
            font-family: var(--font-sans);
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .result-link .result-snippet {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .result-link .result-snippet mark {
            background: rgba(201, 169, 110, 0.25);
            color: var(--accent-gold);
            padding: 0 2px;
            border-radius: 2px;
        }

        /* --- Initial / Empty / Error States --- */
        .search-placeholder,
        .search-empty,
        .search-error {
            text-align: center;
            padding: 64px 0;
            font-family: var(--font-sans);
            color: var(--text-dim);
        }

        .search-placeholder .placeholder-icon,
        .search-empty .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .search-placeholder p {
            font-size: 1.05rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .search-placeholder .hint {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .search-empty p {
            font-size: 1.02rem;
            color: var(--text-muted);
        }

        .search-error p {
            font-size: 0.95rem;
            color: #d4756e;
        }

        /* --- Loading Spinner --- */
        .search-loading {
            text-align: center;
            padding: 48px 0;
            color: var(--text-dim);
            font-family: var(--font-sans);
        }

        .search-loading .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .search-page-title {
                font-size: 1.5rem;
            }

            .search-form {
                flex-direction: column;
            }

            .search-form button {
                width: 100%;
                padding: 12px;
            }

            .result-link {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
         TOP NAVIGATION
         ============================================================ -->
    <nav class="top-nav" aria-label="主导航">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo" aria-label="星庐·中国古天文学知识库首页">&#9737; 星庐·中国古天文学知识库</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="search.html">搜索</a>
            </div>
        </div>
    </nav>

    <!-- ============================================================
         SEARCH CONTAINER
         ============================================================ -->
    <div class="search-container">
        <h1 class="search-page-title">全文搜索</h1>
        <p class="search-page-subtitle">搜索书名、篇名、朝代、作者与内容描述 — 共 17 部史志</p>

        <!-- Search Form -->
        <form class="search-form" id="search-form" role="search" autocomplete="off">
            <input
                type="text"
                id="search-input"
                placeholder="输入关键词，如：超新星、浑天仪、分野、星官…"
                aria-label="搜索天文知识"
                autofocus
            >
            <button type="submit" id="search-button">&#128269; 搜索</button>
        </form>

        <!-- Search Info Bar (hidden initially) -->
        <div class="search-info" id="search-info" style="display:none;">
            <span>找到 <span class="hit-count" id="hit-count">0</span> 条结果</span>
            <span class="search-time" id="search-time"></span>
        </div>

        <!-- Results Area -->
        <div id="results-area">
            <!-- Initial placeholder -->
            <div class="search-placeholder" id="search-placeholder">
                <div class="placeholder-icon">&#9737;</div>
                <p>在上方输入关键词开始搜索</p>
                <p class="hint">支持搜索：书名、篇名、朝代、作者、天文术语、星官名称等</p>
            </div>
        </div>
    </div>

    <!-- ============================================================
         FOOTER
         ============================================================ -->
    <footer role="contentinfo">
        <p>星庐·中国古天文学知识库 &copy; 2026 · 汇历代天文志，承千古观星学</p>
    </footer>

<script>
(function(){
var docs = [{"id": "01", "book": "史记", "chapter": "天官书", "dynasty": "西汉", "author": "司马迁", "year": "约前91年", "volumes": 1, "description": "中国现存最早的系统性天文学著作。将全天星官分为五宫（中东南西北），记录约90多个星官、500余颗恒星，叙述五星运行规律。", "url": "chapters/01_史记_天官书第五.html"}, {"id": "02", "book": "汉书", "chapter": "天文志", "dynasty": "东汉", "author": "班固", "year": "82年", "volumes": 1, "description": "沿用史记天官书体系，补充汉代天象记录，含太阳黑子早期观测、分野学说。", "url": "chapters/02_汉书_天文志.html"}, {"id": "03", "book": "后汉书", "chapter": "天文志", "dynasty": "南朝宋", "author": "范晔、司马彪", "year": "445年", "volumes": 3, "description": "司马彪续汉书八志之一。记载东汉天象，含著名的公元185年超新星记录（SN 185）。", "url": "chapters/03_后汉书_天文志.html"}, {"id": "04", "book": "晋书", "chapter": "天文志", "dynasty": "唐", "author": "房玄龄、李淳风等", "year": "648年", "volumes": 3, "description": "李淳风撰写，体系完整。介绍盖天说、浑天说、宣夜说，详述浑天仪，载283官1464星。", "url": "chapters/04_晋书_天文志.html"}, {"id": "05", "book": "宋书", "chapter": "天文志", "dynasty": "南朝梁", "author": "沈约", "year": "488年", "volumes": 4, "description": "记录南朝刘宋天象，追述三国西晋天象以补前史之缺。", "url": "chapters/05_宋书_天文志.html"}, {"id": "06", "book": "南齐书", "chapter": "天文志", "dynasty": "南朝梁", "author": "萧子显", "year": "537年", "volumes": 2, "description": "记录南齐（479-502年）天象，含日食、星变、分野占验。", "url": "chapters/06_南齐书_天文志.html"}, {"id": "07", "book": "魏书", "chapter": "天象志", "dynasty": "北齐", "author": "魏收", "year": "554年", "volumes": 4, "description": "记录北魏时期（386-550年）天象，含日食、月食、五星、彗星、流星，按年月日排序。", "url": "chapters/07_魏书_天象志.html"}, {"id": "08", "book": "隋书", "chapter": "天文志", "dynasty": "唐", "author": "魏徵、李淳风等", "year": "656年", "volumes": 3, "description": "李淳风续作。天文学理论和仪器部分极为详尽，记载浑天仪、浑象、漏刻，三分法宇宙理论。", "url": "chapters/08_隋书_天文志.html"}, {"id": "09", "book": "旧唐书", "chapter": "天文志", "dynasty": "后晋", "author": "刘昫等", "year": "945年", "volumes": 2, "description": "记录唐代天象，含僧一行的天文学贡献、浑天仪、黄道游仪等仪器。", "url": "chapters/09_旧唐书_天文志.html"}, {"id": "10", "book": "新唐书", "chapter": "天文志", "dynasty": "宋", "author": "欧阳修、宋祁等", "year": "1060年", "volumes": 3, "description": "与旧唐书互补，更重天文学理论。记录一行的大地测量工作，详载天文仪器和历法。", "url": "chapters/10_新唐书_天文志.html"}, {"id": "11", "book": "旧五代史", "chapter": "天文志", "dynasty": "宋", "author": "薛居正等", "year": "974年", "volumes": 1, "description": "记录五代时期（907-960年）天象，以日食、彗星、星变为主要内容。", "url": "chapters/11_旧五代史_天文志.html"}, {"id": "12", "book": "新五代史", "chapter": "司天考", "dynasty": "宋", "author": "欧阳修", "year": "1053年", "volumes": 2, "description": "偏重天文学理论探讨，讨论天人关系、灾异学说，记录五代天象。", "url": "chapters/12_新五代史_司天考.html"}, {"id": "13", "book": "宋史", "chapter": "天文志", "dynasty": "元", "author": "脱脱等", "year": "1345年", "volumes": 13, "description": "二十四史中篇幅最大的天文志（13卷）。记录北宋南宋320年天象，含1054年超新星（蟹状星云），记载苏颂水运仪象台。", "url": "chapters/13_宋史_天文志.html"}, {"id": "14", "book": "辽史", "chapter": "历象志", "dynasty": "元", "author": "脱脱等", "year": "1344年", "volumes": 3, "description": "记录辽代（907-1125年）天文历法，含日食等天象。", "url": "chapters/14_辽史_历象志.html"}, {"id": "15", "book": "金史", "chapter": "天文志", "dynasty": "元", "author": "脱脱等", "year": "1345年", "volumes": 1, "description": "记录金代（1115-1234年）天象，含日食、月食、星变等。", "url": "chapters/15_金史_天文志.html"}, {"id": "16", "book": "元史", "chapter": "天文志", "dynasty": "明", "author": "宋濂等", "year": "1370年", "volumes": 2, "description": "记载郭守敬的天文仪器（简仪、仰仪等），介绍西域天文学传入，记载札马鲁丁的西域天文仪器。", "url": "chapters/16_元史_天文志.html"}, {"id": "17", "book": "明史", "chapter": "天文志", "dynasty": "清", "author": "张廷玉等", "year": "1739年", "volumes": 3, "description": "二十四史最后一部天文志。介绍利玛窦带来的西方天文学，记载徐光启与崇祯历书，反映中西天文学融合。", "url": "chapters/17_明史_天文志.html"}, {"id": "18", "book": "步天歌", "chapter": "步天歌", "dynasty": "唐", "author": "丹元子（王希明）", "year": "约7世纪", "volumes": 1, "description": "唐代天文学诗歌，以七言诗形式描述全天星官。涵盖三垣及二十八宿，是古代学习认星的入门读物。", "url": "chapters/18_步天歌.html"}, {"id": "19", "book": "乙巳占", "chapter": "乙巳占", "dynasty": "唐", "author": "李淳风", "year": "约645年", "volumes": 10, "description": "唐代李淳风所著天文星占学集大成之作。全书十卷一百节，系统总结了唐以前的天文占验理论。", "url": "chapters/19_乙巳占.html"}, {"id": "20", "book": "星庐概论", "chapter": "中国古天文学概论", "dynasty": "当代", "author": "桐安大司空（星庐）", "year": "2025年", "volumes": 1, "description": "基于太乙观星法的中国古天文整合观测体系实证研究。", "url": "chapters/20_星庐中国古天文学概论.html"}];
var sf = document.getElementById('search-form');
var si = document.getElementById('search-input');
var ra = document.getElementById('results-area');
var sinfo = document.getElementById('search-info');
var hc = document.getElementById('hit-count');
var st = document.getElementById('search-time');

function esc(s) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function doSearch(q) {
  q = q.trim();
  if (!q) { sinfo.style.display = 'none'; ra.innerHTML = ''; return; }
  si.value = q;
  var t0 = performance.now();
  var terms = q.split(/\s+/);
  var results = [];
  docs.forEach(function(doc) {
    var score = 0;
    var txt = doc.book + ' ' + doc.chapter + ' ' + doc.dynasty + ' ' + doc.author + ' ' + doc.description;
    terms.forEach(function(t) {
      if (txt.indexOf(t) !== -1) score++;
      if (doc.book === t || doc.chapter === t) score += 5;
    });
    if (score > 0) results.push({doc: doc, score: score});
  });
  results.sort(function(a, b) { return b.score - a.score; });
  var el = (performance.now() - t0).toFixed(0);
  sinfo.style.display = 'flex';
  hc.textContent = results.length;
  st.textContent = el + ' ms';
  if (results.length === 0) {
    ra.innerHTML = '<div class="search-empty"><div class="empty-icon">&#9789;</div><p>未找到匹配「<strong>' + esc(q) + '</strong>」的结果</p><p style="margin-top:8px;font-size:0.85rem;color:var(--text-dim);">请尝试其他关键词，如：超新星、分野、浑天仪、星官、日食</p></div>';
    return;
  }
  var h = '';
  results.forEach(function(r) {
    var d = r.doc;
    var sn = d.description.length > 120 ? d.description.substring(0, 120) + '\u2026' : d.description;
    h += '<a href="' + esc(d.url) + '" class="result-link">' +
      '<div class="result-title">' + esc(d.book) + ' \u00b7 ' + esc(d.chapter) +
      '<span class="result-dynasty">' + esc(d.dynasty) + '</span></div>' +
      '<div class="result-meta">' + esc(d.author) + ' \u00b7 ' + esc(d.year) + '</div>' +
      '<p class="result-snippet">' + esc(sn) + '</p></a>';
  });
  ra.innerHTML = h;
}

sf.addEventListener('submit', function(e) { e.preventDefault(); doSearch(si.value); });
var tt = null;
si.addEventListener('input', function() { clearTimeout(tt); tt = setTimeout(function() { doSearch(si.value); }, 300); });

function getQ() {
  var m = window.location.search.match(/[?&]q=([^&]*)/);
  return m ? decodeURIComponent(m[1]) : '';
}
var q = getQ();
if (q) { si.value = q; doSearch(q); }
})();
</script>
